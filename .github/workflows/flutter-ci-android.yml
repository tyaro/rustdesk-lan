name: CI - Android Build

on:
  workflow_dispatch:
  # LAN運用向け: GitHub Actions利用制限回避のため自動実行は無効化

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-ci:
    uses: ./.github/workflows/flutter-build.yml
    with:
      upload-artifact: true
      upload-tag: "nightly"
      build-windows: false
      build-android: true
      build-ios: false
      concurrency-suffix: "android"
